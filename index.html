<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日野町 オープンデータ・ダッシュボード</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            /* デジタル庁ガイドラインを意識したカラーユニバーサルデザイン対応パレット */
            --color-male: #1d4e89;    /* 深みのある青 */
            --color-female: #d45d00;  /* 視認性の高いオレンジ */
            --color-household: #007a5e; /* 世帯数用の緑 */
            --color-tourism-day: #008eb0; 
            --color-tourism-stay: #e69f00;
            --text-main: #333333;
            --text-sub: #666666;
            --bg-body: #f4f6f9;
            --bg-card: #ffffff;
            --grid-line: #e0e0e0;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            transition: all 0.3s;
        }

        body.embed-mode { background-color: transparent; padding: 0; }
        body.embed-mode .container { box-shadow: none; padding: 10px; max-width: 100%; border-radius: 0; }
        body.embed-mode h1, body.embed-mode .download-box { display: none; }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--bg-card);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            color: var(--text-main);
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--grid-line);
            padding-bottom: 10px;
        }

        .tab-btn {
            padding: 8px 16px;
            border: none;
            background: none;
            font-size: 1rem;
            color: var(--text-sub);
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }

        .tab-btn:hover { background-color: #f0f0f0; }
        .tab-btn.active {
            background-color: var(--text-main);
            color: #fff;
            font-weight: bold;
        }

        /* グラフを複数並べるためのコンテナ */
        .chart-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .chart-box {
            position: relative;
            height: 35vh; /* 2つ並べるため少し高さを抑える */
            width: 100%;
        }

        /* シングルグラフの時は少し高くする */
        .chart-box.single { height: 50vh; }

        .footer-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px solid var(--grid-line);
        }

        .source-note { font-size: 0.85em; color: var(--text-sub); }
        .download-link {
            padding: 8px 16px;
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--text-main);
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.85em;
            transition: 0.2s;
        }
        .download-link:hover { background-color: var(--text-main); color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h1>日野町 オープンデータ・ダッシュボード</h1>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('population', this)">人口・世帯数</button>
        <button class="tab-btn" onclick="switchTab('land_area', this)">地目別面積</button>
        <button class="tab-btn" onclick="switchTab('tourism', this)">観光客入込数</button>
    </div>

    <div id="chartArea" class="chart-container"></div>
    
    <div class="footer-box">
        <div class="download-box">
            <a id="downloadBtn" href="data/hino_population.csv" class="download-link" download>CSVデータをダウンロード</a>
        </div>
        <div class="source-note">出典：「統計でわかる！日野のすがた2025」</div>
    </div>
</div>

<script>
    let activeCharts = [];

    // iframe用モード切替
    if (new URLSearchParams(window.location.search).get('embed') === 'true') {
        document.body.classList.add('embed-mode');
    }

    // 初期ロード
    loadGraph('population');

    function switchTab(dataType, btnElement) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
        document.getElementById('downloadBtn').href = `data/hino_${dataType}.csv`;
        loadGraph(dataType);
    }

    // 既存のグラフを破棄してキャンバスを作り直す
    function resetCanvases(count) {
        activeCharts.forEach(chart => chart.destroy());
        activeCharts = [];
        const chartArea = document.getElementById('chartArea');
        chartArea.innerHTML = ''; // クリア

        const canvases = [];
        for (let i = 0; i < count; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = count === 1 ? 'chart-box single' : 'chart-box';
            const canvas = document.createElement('canvas');
            wrapper.appendChild(canvas);
            chartArea.appendChild(wrapper);
            canvases.push(canvas.getContext('2d'));
        }
        return canvases;
    }

    function loadGraph(dataType) {
        Papa.parse(`data/hino_${dataType}.csv`, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                if (dataType === 'population') renderPopulationGraph(results.data);
                else if (dataType === 'land_area') renderLandAreaGraph(results.data);
                else if (dataType === 'tourism') renderTourismGraph(results.data);
            }
        });
    }

    // 1. 人口・世帯数（2軸廃止、上下に分割。人口は男女積み上げ）
    function renderPopulationGraph(data) {
        const ctxs = resetCanvases(2); // 2つのキャンバスを生成
        const labels = data.map(r => r['年']);

        // 上段：総人口（男女積み上げ）
        activeCharts.push(new Chart(ctxs[0], {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { label: '男 (人)', data: data.map(r => r['男']), backgroundColor: 'var(--color-male)' },
                    { label: '女 (人)', data: data.map(r => r['女']), backgroundColor: 'var(--color-female)' }
                ]
            },
            options: getBaseOptions('人口推移（男女別積み上げ）', { x: { stacked: true }, y: { stacked: true, min: 0 } })
        }));

        // 下段：世帯数（独立した棒グラフ）
        activeCharts.push(new Chart(ctxs[1], {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{ label: '世帯数 (世帯)', data: data.map(r => r['世帯数']), backgroundColor: 'var(--color-household)' }]
            },
            options: getBaseOptions('世帯数推移', { y: { min: 0 } })
        }));
    }

    // 2. 地目別面積（積み上げ棒グラフ）
    function renderLandAreaGraph(data) {
        const ctxs = resetCanvases(1);
        const labels = data.map(r => r['年']);
        activeCharts.push(new Chart(ctxs[0], {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { label: '林山 (ha)', data: data.map(r => r['林山']), backgroundColor: '#447c59' },
                    { label: '田 (ha)', data: data.map(r => r['田']), backgroundColor: '#98b46b' },
                    { label: '畑 (ha)', data: data.map(r => r['畑']), backgroundColor: '#e2d37c' },
                    { label: '宅地 (ha)', data: data.map(r => r['宅地']), backgroundColor: '#c76b6b' }
                ]
            },
            options: getBaseOptions('地目別面積推移', { x: { stacked: true }, y: { stacked: true, min: 0 } })
        }));
    }

    // 3. 観光客数（合計が意味を持つため積み上げ棒グラフ）
    function renderTourismGraph(data) {
        const ctxs = resetCanvases(1);
        const labels = data.map(r => r['年']);
        activeCharts.push(new Chart(ctxs[0], {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { label: '日帰り客 (人)', data: data.map(r => r['日帰り']), backgroundColor: 'var(--color-tourism-day)' },
                    { label: '宿泊客 (人)', data: data.map(r => r['宿泊']), backgroundColor: 'var(--color-tourism-stay)' }
                ]
            },
            options: getBaseOptions('観光客入込数推移', { x: { stacked: true }, y: { stacked: true, min: 0 } })
        }));
    }

    // データインク比を高めた共通オプション
    function getBaseOptions(titleText, customScales) {
        return {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                title: { display: true, text: titleText, color: 'var(--text-main)', font: { size: 14 } },
                legend: { position: 'top', labels: { usePointStyle: true, boxWidth: 10 } },
                tooltip: {
                    backgroundColor: 'rgba(255,255,255,0.95)',
                    titleColor: '#333',
                    bodyColor: '#333',
                    borderColor: '#ccc',
                    borderWidth: 1,
                    callbacks: {
                        label: function(context) {
                            return context.dataset.label + ': ' + new Intl.NumberFormat('ja-JP').format(context.raw);
                        }
                    }
                }
            },
            scales: Object.assign({
                x: { grid: { display: false } }, // X軸の縦線を消してすっきりさせる
                y: { grid: { color: 'var(--grid-line)' } }
            }, customScales)
        };
    }
</script>

</body>
</html>
